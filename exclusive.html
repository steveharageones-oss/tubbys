<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exclusive Inventory | Tubby's Tumblerz</title>

    <meta property="og:title" content="Exclusive Inventory | Tubby's Tumblerz">
    <meta property="og:description" content="Special themes and requested designs that aren't available on our main shop.">
    <meta property="og:image" content="https://tubbystumblerz.com/og-image.png">
    <meta property="og:url" content="https://tubbystumblerz.com/exclusive.html">
    <meta property="og:type" content="website">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">
    <meta name="twitter:card" content="summary_large_image">

    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <div class="container nav-bar">
            <nav class="main-nav">
                <a href="index.html">Home</a>
                <a href="index.html#shop">Etsy Shop</a>
                <a href="index.html#exclusives">Shop Exclusives</a>
                <a href="index.html#custom-request">Custom Requests</a>
            </nav>
            <a href="#" id="cart-icon" class="cart-nav-icon" aria-label="Shopping cart">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="24" height="24">
                    <path d="M3 3h2l2.5 12.5h12L22 7H6"/>
                    <circle cx="9" cy="20" r="1.5"/>
                    <circle cx="17" cy="20" r="1.5"/>
                </svg>
                <span id="cart-badge" class="cart-badge" style="display:none;">0</span>
            </a>
        </div>
    </header>

    <main>
        <section class="hero page-header">
            <div class="container">
                <h1>Exclusive Inventory</h1>
                <p>Special themes and requested designs that aren't available on our main shop!</p>
            </div>
        </section>

        <section class="shop-section">
            <div class="container">
                <div class="category-tabs">
                    <button class="tab-btn active" data-category="all">All</button>
                    <button class="tab-btn" data-category="Tumblers">Tumblers</button>
                    <button class="tab-btn" data-category="Tumblers w/ Topper">Tumblers w/ Topper</button>
                </div>
                <div id="exclusive-products" class="product-grid">
                    <p class="loading" style="font-size: 1.2rem; font-weight: bold; color: var(--primary);">Fetching the latest exclusives...</p>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2024 Tubby's Tumblerz. Made with &#x1F496;</p>
        </div>
    </footer>

    <!-- Cart Drawer -->
    <div id="cart-overlay" class="cart-overlay"></div>
    <div id="cart-drawer" class="cart-drawer">
        <div class="cart-drawer-header">
            <h2>Your Cart</h2>
            <button id="cart-close-btn" class="cart-close-btn">&times;</button>
        </div>
        <div id="cart-items" class="cart-items"></div>
        <div class="cart-drawer-footer">
            <div class="cart-subtotal-row">
                <span>Subtotal</span>
                <span id="cart-subtotal">$0.00</span>
            </div>
            <button id="cart-checkout-btn" class="btn btn-primary btn-large" style="display:none;">Checkout</button>
        </div>
    </div>

    <script src="cart.js"></script>
    <script src="exclusive.js"></script>
</body>
</html>
