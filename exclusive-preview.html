<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>[PREVIEW] Exclusive Inventory | Tubby's Tumblerz</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;800&family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">
    <!-- ── PREVIEW OVERRIDES: Etsy-style compact mobile grid ── -->
    <style>
        /* ── Keep desktop 5-column unchanged ── */
        #exclusive-products.product-grid {
            grid-template-columns: repeat(5, 1fr);
            gap: 18px;
        }
        #exclusive-products .product-card {
            padding: 10px;
            border-radius: 12px;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        #exclusive-products .product-card:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
        }
        #exclusive-products .product-card h3 {
            font-size: 0.85rem;
            margin: 6px 0 2px;
            color: var(--text-dark);
            text-align: center;
            line-height: 1.2;
        }
        #exclusive-products .product-card .product-price {
            font-weight: 700;
            font-size: 0.9rem;
            color: var(--secondary);
            font-family: 'Baloo 2', cursive;
            margin-bottom: 0;
        }
        #exclusive-products .product-card .price,
        #exclusive-products .product-card .btn,
        #exclusive-products .product-card .category-badge {
            display: none;
        }
        #exclusive-products .shipping-note {
            font-size: 0.6rem;
            color: #999;
            margin: 0;
            line-height: 1;
        }
        #exclusive-products .product-image,
        #exclusive-products .product-card img {
            width: 100%;
            aspect-ratio: 1 / 1;
            object-fit: contain;
            background-color: var(--accent);
            margin-bottom: 0;
            border-radius: 8px;
        }

        /* ── Tablet: 3 columns with slightly tighter cards ── */
        @media (max-width: 900px) {
            #exclusive-products.product-grid {
                grid-template-columns: repeat(3, 1fr);
                gap: 12px;
            }
            #exclusive-products .product-card {
                padding: 8px;
                border-radius: 10px;
            }
            #exclusive-products .product-card h3 {
                font-size: 0.75rem;
                margin: 4px 0 1px;
            }
            #exclusive-products .product-card .product-price {
                font-size: 0.8rem;
            }
            #exclusive-products .product-image,
            #exclusive-products .product-card img {
                border-radius: 6px;
            }
        }

        /* ── Mobile: 2-column Etsy-style compact grid ── */
        @media (max-width: 500px) {
            #exclusive-products.product-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 8px;
            }
            #exclusive-products .product-card {
                padding: 6px;
                border-radius: 8px;
            }
            #exclusive-products .product-card:hover {
                transform: scale(1.03);
            }
            #exclusive-products .product-card h3 {
                font-size: 0.7rem;
                margin: 3px 0 1px;
                line-height: 1.15;
            }
#exclusive-products .product-card .product-price {
            font-size: 0.72rem;
        }
        #exclusive-products .product-image,
            #exclusive-products .product-card img {
                aspect-ratio: 1 / 1;
                border-radius: 5px;
            }
        }
        /* ── Modal shipping disclaimer ── */
        .modal-shipping {
            font-size: 0.85rem;
            color: #888;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <header>
        <div class="container nav-bar">
            <nav class="main-nav">
                <a href="index.html">Home</a>
                <a href="index.html#shop">Etsy Shop</a>
                <a href="exclusive.html">Exclusive Inventory</a>
                <a href="index.html#custom-request">Custom Requests</a>
            </nav>
        </div>
    </header>

    <main>
        <section class="hero page-header">
            <div class="container">
                <h1>🔍 PREVIEW — Exclusive Inventory</h1>
                <p>Etsy-style compact mobile grid. Open exclusive.html to compare.</p>
            </div>
        </section>

        <section class="shop-section">
            <div class="container">
                <div class="category-tabs">
                    <button class="tab-btn active" data-category="all">All</button>
                    <button class="tab-btn" data-category="Tumblers">Tumblers</button>
                    <button class="tab-btn" data-category="Tumblers w/ Topper">Tumblers w/ Topper</button>
                </div>
                <div id="exclusive-products" class="product-grid">
                    <p class="loading" style="font-size: 1.2rem; font-weight: bold; color: var(--primary);">Fetching the latest exclusives...</p>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2024 Tubby's Tumblerz. Made with &#x1F496;</p>
        </div>
    </footer>

    <!-- Product Details Modal -->
    <div id="productModal" class="modal">
        <div class="modal-details">
            <span class="close-modal">&times;</span>
            <img id="modalImg" src="" alt="">
            <h2 id="modalTitle"></h2>
            <p class="modal-price" id="modalPrice"></p>
            <p class="modal-shipping">Shipping &amp; handling calculated at checkout</p>
            <div class="modal-buttons">
                <button id="buyNowBtn" class="btn btn-primary">Buy Now</button>
            </div>
        </div>
    </div>

    <script src="exclusive.js"></script>
</body>
</html>
