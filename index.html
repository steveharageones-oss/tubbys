<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tubby's Tumblerz</title>
    <link rel="stylesheet" href="styles.css">
    <!-- Using Google Fonts for a clean, modern look -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <div class="container nav-bar">
            <!-- Assuming logo.png is in the same folder -->
            <img src="logo.png" alt="Tubby's Tumblerz Logo" class="logo">
            <nav>
                <a href="#home">Home</a>
                <a href="#shop">Shop</a>
                <a href="#contact">Contact</a>
            </nav>
        </div>
    </header>

    <main>
        <section id="home" class="hero">
            <div class="container">
                <h1>Beautifully Crafted Tumblers</h1>
                <p>Minimalist design meets everyday utility.</p>
                <a href="#shop" class="btn">Browse Collection</a>
            </div>
        </section>

        <section id="shop" class="shop-section">
            <div class="container">
                <h2>Our Products</h2>
                <p class="subtitle">Directly from our Etsy store.</p>
                <!-- The Etsy products will be injected here by Javascript -->
                <div id="etsy-products" class="product-grid">
                    <p class="loading">Loading latest products...</p>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2024 Tubby's Tumblerz. All rights reserved.</p>
        </div>
    </footer>

    <script src="app.js"></script>
</body>
</html>
