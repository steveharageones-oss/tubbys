<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="page-title">Product | Tubby's Tumblerz</title>

    <!-- Dynamic OG tags filled by product.js -->
    <meta property="og:title" id="og-title" content="Tubby's Tumblerz">
    <meta property="og:description" id="og-desc" content="Custom handcrafted tumblers from Tubby's Tumblerz.">
    <meta property="og:image" id="og-image" content="https://tubbystumblerz.com/og-image.png">
    <meta property="og:url" id="og-url" content="https://tubbystumblerz.com">
    <meta property="og:type" content="product">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">
    <meta name="twitter:card" content="summary_large_image">

    <link rel="stylesheet" href="/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <div class="container nav-bar">
            <nav class="main-nav">
                <a href="/index.html">Home</a>
                <a href="/index.html#shop">Etsy Shop</a>
                <a href="/index.html#exclusives">Shop Exclusives</a>
                <a href="/index.html#custom-request">Custom Requests</a>
            </nav>
            <a href="#" id="cart-icon" class="cart-nav-icon" aria-label="Shopping cart">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="24" height="24">
                    <path d="M3 3h2l2.5 12.5h12L22 7H6"/>
                    <circle cx="9" cy="20" r="1.5"/>
                    <circle cx="17" cy="20" r="1.5"/>
                </svg>
                <span id="cart-badge" class="cart-badge" style="display:none;">0</span>
            </a>
        </div>
    </header>

    <main class="product-page-main">
        <div class="container">
            <!-- Breadcrumb -->
            <nav class="breadcrumb">
                <a href="/index.html">Home</a>
                <span class="breadcrumb-sep">/</span>
                <a href="/index.html#exclusives">Shop Exclusives</a>
                <span class="breadcrumb-sep">/</span>
                <span id="breadcrumb-name">Product</span>
            </nav>

            <!-- Product Detail -->
            <div id="product-detail" class="product-detail-layout">
                <div class="product-detail-loading">
                    <p>Loading product...</p>
                </div>
            </div>

            <!-- Related Products -->
            <section class="related-products-section" id="related-section" style="display:none;">
                <h2>You Might Also Like</h2>
                <div id="related-products" class="related-products-grid"></div>
            </section>
        </div>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2026 Tubby's Tumblerz. Handcrafted in the USA.</p>
        </div>
    </footer>

    <!-- Cart Drawer -->
    <div id="cart-overlay" class="cart-overlay"></div>
    <div id="cart-drawer" class="cart-drawer">
        <div class="cart-drawer-header">
            <h2>Your Cart</h2>
            <button id="cart-close-btn" class="cart-close-btn">&times;</button>
        </div>
        <div id="cart-items" class="cart-items"></div>
        <div class="cart-drawer-footer">
            <div class="cart-subtotal-row">
                <span>Subtotal</span>
                <span id="cart-subtotal">$0.00</span>
            </div>
            <button id="cart-checkout-btn" class="btn btn-primary btn-large" style="display:none;">Checkout</button>
        </div>
    </div>

    <script src="/cart.js"></script>
    <script src="/product.js"></script>
</body>
</html>
