<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Confirmed | Tubby's Tumblerz</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        .success-section {
            text-align: center;
            padding: 100px 20px;
            min-height: 60vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .success-card {
            background: white;
            border-radius: 12px;
            padding: 50px 40px;
            max-width: 550px;
            box-shadow: 0 6px 30px rgba(0,90,156,0.1);
            border-top: 4px solid var(--secondary);
        }
        .success-icon {
            font-size: 64px;
            margin-bottom: 20px;
        }
        .success-card h1 {
            font-size: 2.2rem;
            margin-bottom: 15px;
            color: var(--primary);
        }
        .success-card p {
            font-size: 1.1rem;
            color: var(--text-dark);
            opacity: 0.8;
            margin-bottom: 30px;
            line-height: 1.6;
        }
        .order-id {
            background: var(--accent);
            padding: 12px 20px;
            border-radius: 8px;
            font-family: 'Inter', sans-serif;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 30px;
            font-size: 0.95rem;
        }
    </style>
</head>
<body>
    <header>
        <div class="container nav-bar">
            <nav class="main-nav">
                <a href="index.html">Home</a>
                <a href="index.html#shop">Etsy Shop</a>
                <a href="index.html#exclusives">Shop Exclusives</a>
                <a href="index.html#custom-request">Custom Requests</a>
            </nav>
        </div>
    </header>

    <main>
        <section class="success-section">
            <div class="success-card">
                <div class="success-icon">✓</div>
                <h1>Order Confirmed!</h1>
                <p>Thank you for your purchase! Your tumbler is being prepared with care. You'll receive a confirmation email shortly.</p>
                <div class="order-id" id="orderId">Loading order details...</div>
                <a href="index.html#exclusives" class="btn btn-primary">Continue Shopping</a>
            </div>
        </section>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2026 Tubby's Tumblerz. Handcrafted in the USA.</p>
        </div>
    </footer>

    <script>
        // Display the Stripe Payment Intent ID from the URL
        const params = new URLSearchParams(window.location.search);
        const piId = params.get('pi_id') || params.get('payment_intent');
        if (piId) {
            document.getElementById('orderId').textContent = 'Order Reference: ' + piId.slice(-8).toUpperCase();
        } else {
            document.getElementById('orderId').textContent = 'Order placed successfully!';
        }

        // Clear the cart after successful payment
        if (typeof Cart !== 'undefined') {
            Cart.clearCart();
        } else {
            localStorage.removeItem('tubbys_cart');
        }
    </script>
</body>
</html>
