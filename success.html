<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Confirmed | Tubby's Tumblerz</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;800&family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        .success-section {
            text-align: center;
            padding: 100px 20px;
            min-height: 60vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .success-card {
            background: white;
            border-radius: 30px;
            padding: 60px 40px;
            max-width: 550px;
            box-shadow: 0 20px 50px rgba(0,90,156,0.15);
            border-top: 8px solid var(--secondary);
        }
        .success-icon {
            font-size: 80px;
            margin-bottom: 20px;
        }
        .success-card h1 {
            font-size: 2.5rem;
            margin-bottom: 15px;
            color: var(--primary);
        }
        .success-card p {
            font-size: 1.2rem;
            color: var(--text-dark);
            opacity: 0.8;
            margin-bottom: 30px;
            line-height: 1.6;
        }
        .order-id {
            background: var(--accent);
            padding: 12px 20px;
            border-radius: 12px;
            font-family: 'Quicksand', sans-serif;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 30px;
            font-size: 0.95rem;
        }
    </style>
</head>
<body>
    <header>
        <div class="container nav-bar">
            <nav class="main-nav">
                <a href="index.html">Home</a>
                <a href="index.html#shop">Etsy Shop</a>
                <a href="exclusive.html">Exclusive Inventory</a>
                <a href="index.html#custom-request">Custom Requests</a>
            </nav>
        </div>
    </header>

    <main>
        <section class="success-section">
            <div class="success-card">
                <div class="success-icon">🎉</div>
                <h1>Order Confirmed!</h1>
                <p>Thank you for your purchase! Your tumbler is being prepared with love. You'll receive a confirmation email shortly.</p>
                <div class="order-id" id="orderId">Loading order details...</div>
                <a href="exclusive.html" class="btn btn-primary">Continue Shopping</a>
            </div>
        </section>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2024 Tubby's Tumblerz. Made with 💖</p>
        </div>
    </footer>

    <script>
        // Display the Stripe session ID from the URL
        const params = new URLSearchParams(window.location.search);
        const sessionId = params.get('session_id');
        if (sessionId) {
            document.getElementById('orderId').textContent = 'Order Reference: ' + sessionId.slice(-8).toUpperCase();
        } else {
            document.getElementById('orderId').textContent = 'Order placed successfully!';
        }
    </script>
</body>
</html>
